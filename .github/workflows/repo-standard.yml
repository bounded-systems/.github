# repo-standard — the one reusable workflow every repo calls. A repo drops a single
# thin caller (.github/workflows/standard.yml) and opts into behaviors via inputs;
# all the logic lives here, so a change updates every repo at once (derive, not copy).
# See bounded-systems/conformance for the caller template + rollout.
#
# Behaviors (all opt-in):
#   security  (default true)  — OSV-Scanner (report-only) + dependency-review (PR gate)
#   scorecard (default true)  — OSSF Scorecard supply-chain posture (report-only)
#   sbom      (default false) — SPDX SBOM (uploads release assets; needs contents: write)
#   test      (default false) — set up `runtime` and run `test-command`
#
# All actions SHA-pinned (org policy). Invocations copied from prx's proven
# osv-scanner.yml / dependency-review.yml / scorecard.yml / sbom.yml, generalized
# to be language-agnostic. scorecard/sbom raise the security floor org-wide — see
# workflow-standardization: they previously ran on ~2 of 72 repos.
name: repo-standard

on:
  workflow_call:
    inputs:
      security:
        description: "Run OSV-Scanner + dependency-review."
        type: boolean
        default: true
      scorecard:
        description: "Run OSSF Scorecard (report-only supply-chain posture)."
        type: boolean
        default: true
      sbom:
        description: "Generate an SPDX SBOM (uploads to release assets; caller must grant contents: write)."
        type: boolean
        default: false
      test:
        description: "Run the test job (set runtime + test-command)."
        type: boolean
        default: false
      descriptor:
        description: "Run the descriptor drift-gate: README managed blocks must match trellis.json."
        type: boolean
        default: false
      runtime:
        description: "Test runtime to set up: bun | deno | node | nix | none."
        type: string
        default: "none"
      test-command:
        description: "Shell command to run for the test job."
        type: string
        default: ""
      deno-version:
        description: "Deno version for runtime: deno (default current 2.x)."
        type: string
        default: "v2.x"

permissions:
  contents: read

jobs:
  osv:
    if: ${{ inputs.security }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: OSV-Scanner (report-only)
        continue-on-error: true
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          # --recursive auto-discovers every lockfile/manifest in the repo, so this
          # is language-agnostic (bun.lock, deno.lock, Cargo.lock, package-lock, …).
          scan-args: |-
            --format=sarif
            --output=results.sarif
            --recursive
            .
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: osv-scanner-results
          path: results.sarif
          retention-days: 5

  dependency-review:
    if: ${{ inputs.security && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Report-only baseline: degrades gracefully on repos without Dependency graph
      # enabled (most repos), surfaces high-severity findings where it is. Promote to
      # a hard gate per-repo later (drop continue-on-error once the graph is on).
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        continue-on-error: true
        with:
          fail-on-severity: high

  scorecard:
    # OSSF Scorecard runs on push/schedule (not PR — it scores the repo, not a diff).
    if: ${{ inputs.scorecard && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # Report-only: publish_results=false and no SARIF upload (upload needs Advanced
      # Security on private repos), so results are kept as an artifact. That keeps the
      # perms minimal (contents+actions read) so callers don't need security-events.
      - name: OSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: false
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

  sbom:
    # Opt-in (default false): uploads to release assets, so the caller must grant
    # contents: write. Meant for repos that publish releases.
    if: ${{ inputs.sbom && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          format: spdx-json
          artifact-name: sbom.spdx.json
          output-file: sbom.spdx.json
          upload-artifact: true
          upload-release-assets: true

  test:
    if: ${{ inputs.test }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - if: ${{ inputs.runtime == 'bun' }}
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - if: ${{ inputs.runtime == 'deno' }}
        uses: denoland/setup-deno@11b63cf76cfcafb4e43f97b6cad24d8e8438f62d # v1
        with:
          deno-version: ${{ inputs.deno-version }}
      - if: ${{ inputs.runtime == 'node' }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - if: ${{ inputs.runtime == 'nix' }}
        uses: DeterminateSystems/determinate-nix-action@629b284231c2a82554b724e357e47fc6020833c8 # v3
      - name: test
        run: ${{ inputs.test-command }}

  descriptor:
    if: ${{ inputs.descriptor }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # descriptor pins each claim to its last-touching commit
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      # descriptor-kit is cloned until it publishes to JSR, then this becomes
      #   bunx jsr:@bounded-systems/descriptor-kit check .
      - name: descriptor drift-gate (README ⇄ trellis.json)
        run: |
          git clone --depth 1 https://github.com/bounded-systems/descriptor-kit /tmp/descriptor-kit
          (cd /tmp/descriptor-kit && bun install --frozen-lockfile)
          bun /tmp/descriptor-kit/src/cli.ts check .
