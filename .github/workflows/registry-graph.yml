name: registry-graph

# The knowledge-graph diagram on the org profile is generated from the public
# registry (bounded-systems/site/data/registry.json) by
# scripts/gen-registry-graph.mjs. Drift gate on PRs; weekly refresh + PR on change.
on:
  pull_request:
    paths: ["profile/README.md", "scripts/gen-registry-graph.mjs"]
  schedule:
    - cron: "29 7 * * 1"
  workflow_dispatch:
permissions:
  contents: read
jobs:
  check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
      - run: node scripts/gen-registry-graph.mjs --check
  sync:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions: { contents: write, pull-requests: write }
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
      - run: node scripts/gen-registry-graph.mjs
      - env: { GH_TOKEN: "${{ github.token }}" }
        run: |
          [ -z "$(git status --porcelain)" ] && { echo "in sync"; exit 0; }
          b="registry-graph/$(date -u +%Y%m%d%H%M%S)"
          git config user.name "github-actions[bot]"; git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$b"; git commit -am "chore(profile): sync knowledge-graph from the registry"; git push origin "$b"
          gh pr create --base main --head "$b" --title "chore(profile): sync knowledge-graph from the registry" --body "Automated by registry-graph.yml — the registry changed."
