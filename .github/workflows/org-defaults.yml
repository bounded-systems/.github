name: org-defaults
# Enforce the org-defaults contract: content/strings.json + the community-health
# defaults must conform to org-defaults.mjs (semantics on this repo's static data).
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
      - run: node --test org-defaults.test.mjs
