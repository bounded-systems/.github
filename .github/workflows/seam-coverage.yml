name: seam-coverage

# Org-wide structural guarantee for trust ledger row 3.2: every
# @bounded-systems capability package (a repo whose package.json carries a
# `bounded` block) must declare a seam claim via @bounded-systems/seam-check.
# Per-repo CI proves the repos that HAVE a check; this proves the SET is complete
# — a brand-new uncovered capability repo fails here. Reuses the published
# harness's `assertAllPackagesChecked` over freshly-cloned repos.
#
# SHA-pinned third-party actions only (org hardening §4), matching the package
# repos' own ci.yml.

on:
  schedule:
    - cron: "17 7 * * 1" # weekly, Monday 07:17 UTC (off the :00 stampede)
  workflow_dispatch:
  pull_request:
    paths: # self-validate when the meta-test itself changes
      - "scripts/check-seam-coverage.ts"
      - "package.json"
      - ".npmrc"
      - ".github/workflows/seam-coverage.yml"
  push:
    branches: [main]
    paths:
      - "scripts/check-seam-coverage.ts"
      - "package.json"
      - ".npmrc"
      - ".github/workflows/seam-coverage.yml"

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Seam coverage — every capability package declares a seam claim
        env:
          GH_TOKEN: ${{ github.token }}
        run: bun scripts/check-seam-coverage.ts
