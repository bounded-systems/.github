# Fleet status board — synoptic Layer 2 (monitoring).
#
# Runs synoptic's `status` mode against the bounded-systems org and commits a
# freshness-stamped STATUS.md + status.json. This is the NON-deterministic
# monitoring view; it lives here (org infra) while the tool itself stays
# bdelanghe/synoptic-github. See that repo's examples/fleet-status.yml.
#
# BLOCKED until two prerequisites exist (see beads prx-u0df / prx-ebmp):
#   1. secret FLEET_READ_TOKEN — org-wide repo READ (to read every repo's CI +
#      PRs) AND contents:write on THIS repo (the action's container pushes the
#      board back here). The default GITHUB_TOKEN only reads this repo. PAT now,
#      or the ghd GitHub-App token (prx-e1c).
#   2. image >= v2.2.6 (ghcr.io/bdelanghe/synoptic-github) so `mode: status`
#      resolves status.ts.
#
# Schedule is intentionally COMMENTED until a manual dispatch confirms it's green,
# so a half-wired board can't spam red scheduled runs across org infra.
name: fleet-status
on:
  # schedule:
  #   - cron: '0 */6 * * *'   # enable after the first successful dispatch
  workflow_dispatch: {}
permissions:
  contents: write             # the action commits the board back to this repo
jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bdelanghe/synoptic-github@v2.2.6   # mode:status needs >= v2.2.6
        with:
          GITHUB_TOKEN: ${{ secrets.FLEET_READ_TOKEN }}
          mode: status
          gh-user: bounded-systems
          status-out: STATUS.md
      # No commit step: the action's container entrypoint already runs
      # git add/commit/push when the board changes, using the GITHUB_TOKEN above.
