# Fleet status board — synoptic Layer 2 (monitoring).
#
# Runs synoptic's `status` mode against the bounded-systems org and commits a
# freshness-stamped STATUS.md + status.json. This is the NON-deterministic
# monitoring view; it lives here (org infra) while the tool itself stays
# bdelanghe/synoptic-github. See that repo's examples/fleet-status.yml.
#
# BLOCKED until two prerequisites exist (see beads prx-u0df / prx-ebmp):
#   1. secret FLEET_READ_TOKEN — org-wide repo READ (the default GITHUB_TOKEN
#      only reads this repo). PAT now, or the ghd GitHub-App token (prx-e1c).
#   2. ghcr.io/bdelanghe/synoptic-github:latest republished to include status.ts
#      (cut a tag on bdelanghe/synoptic-github after PR #23 merges).
#
# Schedule is intentionally COMMENTED until a manual dispatch confirms it's green,
# so a half-wired board can't spam red scheduled runs across org infra.
name: fleet-status
on:
  # schedule:
  #   - cron: '0 */6 * * *'   # enable after the first successful dispatch
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bdelanghe/synoptic-github@v2   # pulls ghcr :latest; pin a SHA once stable
        with:
          GITHUB_TOKEN: ${{ secrets.FLEET_READ_TOKEN }}
          mode: status
          gh-user: bounded-systems
          status-out: STATUS.md
      - name: commit the board
        run: |
          git config user.name  'fleet-status[bot]'
          git config user.email 'fleet-status@users.noreply.github.com'
          git add STATUS.md status.json
          git diff --cached --quiet || git commit -m "chore: fleet status $(date -u +%FT%TZ)"
          git push
