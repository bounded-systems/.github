# repo-flake-publish — publish a repo's Nix flake to FlakeHub so consumers pin it
# by semver (rolling) instead of a git SHA:
#   url = "https://flakehub.com/f/bounded-systems/<repo>/*.tar.gz";
#
# Consolidates the near-identical flakehub-publish.yml copied across the flake repos
# (door-*, claude-box, facilities): checkout → nix-installer → flakehub-push. Each
# caller drops a thin standard-style caller and only configures rolling/visibility.
#
# AUTHORITY CEILING — `id-token: write` (FlakeHub OIDC, no secret) + `contents: read`.
# This is a distinct ceiling from repo-standard.yml's `contents: read`, so per the
# one-workflow-one-ceiling rule (#55/#57) it lives in its own reusable workflow: a
# caller grants `id-token: write` here and nowhere else. All actions SHA-pinned.
name: repo-flake-publish

on:
  workflow_call:
    inputs:
      rolling:
        description: "Publish a rolling (semver-from-commit) release rather than a tagged one."
        type: boolean
        default: true
      visibility:
        description: "FlakeHub visibility: public | unlisted | private."
        type: string
        default: "public"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # FlakeHub publish (OIDC — no secret)
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: DeterminateSystems/nix-installer-action@1d87d45818068401a10cf16bdc5f00b24994a83f # v20
        with:
          extra-conf: |
            extra-experimental-features = nix-command flakes
      - uses: DeterminateSystems/flakehub-push@71f57208810a5d299fc6545350981de98fdbc860 # v6
        with:
          rolling: ${{ inputs.rolling }}
          visibility: ${{ inputs.visibility }}
