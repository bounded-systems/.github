name: knowledge-check

on:
  pull_request:
    paths:
      - "knowledge/**"
      - "scripts/check-knowledge.py"
      - ".github/workflows/knowledge-check.yml"
  push:
    branches: [main]
    paths:
      - "knowledge/**"
      - "scripts/check-knowledge.py"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Check knowledge graph consistency
        run: python3 scripts/check-knowledge.py
