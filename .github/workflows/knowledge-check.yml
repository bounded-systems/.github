name: knowledge-check

# No third-party actions: the org allow-list requires SHA-pinned actions
# (front-desk-add.yml, hardening §4), so this workflow uses only preinstalled
# git + python3 and pins nothing. The repo is public, so the checkout needs no
# token — hence permissions: {}.

on:
  pull_request:
    paths:
      - "knowledge/**"
      - "scripts/check-knowledge.py"
      - ".github/workflows/knowledge-check.yml"
  push:
    branches: [main]
    paths:
      - "knowledge/**"
      - "scripts/check-knowledge.py"

permissions: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the commit under test
        env:
          REPO: ${{ github.repository }}
          REF: ${{ github.ref }}
        run: |
          git init -q .
          git remote add origin "https://github.com/${REPO}.git"
          git fetch -q --depth 1 origin "${REF}"
          git checkout -q FETCH_HEAD
      - name: Check knowledge graph consistency
        run: python3 scripts/check-knowledge.py
